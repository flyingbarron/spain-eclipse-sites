# Docker Compose configuration for Spain Eclipse Sites
version: '3.8'

services:
  web:
    build: .
    container_name: eclipse-sites-web
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.cache:/app/.cache
    environment:
      - ECLIPSE_SITES_SERVER_HOST=0.0.0.0
      - ECLIPSE_SITES_SERVER_PORT=8000
      - ECLIPSE_SITES_LOGGING_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

