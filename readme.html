<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>README - Spain Eclipse Site Viewer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦕</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
            padding: 2rem;
            text-align: left;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: left;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 3px solid #3498db;
            text-align: left;
        }
        
        h2 {
            color: #34495e;
            margin-top: 2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid #ecf0f1;
            text-align: left;
        }
        
        h3 {
            color: #555;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            text-align: left;
        }
        
        p {
            margin-bottom: 1rem;
            text-align: left;
        }
        
        #content {
            text-align: left;
        }
        
        ul, ol {
            margin-left: 2rem;
            margin-bottom: 1rem;
            text-align: left;
        }
        
        li {
            margin-bottom: 0.5rem;
        }
        
        code {
            background: #f4f4f4;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1rem;
            text-align: left;
        }
        
        pre code {
            background: none;
            color: inherit;
            padding: 0;
            text-align: left;
        }
        
        a {
            color: #3498db;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
        
        strong {
            color: #2c3e50;
            font-weight: 600;
        }
        
        #content.loading {
            text-align: center;
            padding: 2rem;
            color: #7f8c8d;
        }
        
        .error {
            background: #e74c3c;
            color: white;
            padding: 1rem;
            border-radius: 5px;
            margin: 1rem 0;
        }
        
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            background: #3498db;
            color: white;
            border-radius: 5px;
            text-decoration: none;
        }
        
        .back-link:hover {
            background: #2980b9;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="viewer.html" class="back-link">← Back to Viewer</a>
        <div id="content" class="loading">Loading README...</div>
    </div>
    
    <script type="module">
        import { marked } from 'https://cdn.jsdelivr.net/npm/marked@11.1.1/+esm';
        
        async function loadReadme() {
            const contentDiv = document.getElementById('content');
            try {
                const response = await fetch('/api/readme');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                const html = marked.parse(data.content || '');
                contentDiv.innerHTML = html;
            } catch (error) {
                console.error('Error loading README:', error);
                contentDiv.innerHTML = '<div class="error">Unable to load README content. Please try again.</div>';
            }
        }
        
        loadReadme();
    </script>
</body>
</html>
